name: Benchmark

on:
  pull_request:
    paths:
      - 'moctale_moderation/engine.py'
      - 'moctale_moderation/patterns.py'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Run benchmark
        run: python scripts/benchmark_engine.py
